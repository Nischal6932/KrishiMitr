# Render Blueprint for KrishiMitr
services:
  - type: web
    name: krishimitr
    runtime: docker
    plan: starter  # $7/month - upgrade to standard for more CPU/memory
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        value: "*"  # Allow ESP32 and all origins
      - key: PORT
        value: 10000
    disk:
      name: uploads
      mountPath: /app/frontend/public/uploads
      sizeGB: 1
